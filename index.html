<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Embed Studio v2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <h1>Embed Studio v2</h1>

  <div class="tabs">
    <button onclick="showTab('builder')">Builder</button>
    <button onclick="showTab('preview')">Preview</button>
    <button onclick="showTab('templates')">Templates</button>
    <button onclick="showTab('settings')">Settings</button>
  </div>

  <!-- BUILDER -->
  <div id="builder" class="tab active">

    <input id="webhook" placeholder="Webhook URL">

    <input id="title" placeholder="Title">
    <input id="color" placeholder="Color (#5865F2)">

    <textarea id="description" placeholder="Description"></textarea>

    <input id="fieldName" placeholder="Field Name">
    <input id="fieldValue" placeholder="Field Value">

    <input id="footer" placeholder="Footer">

    <button id="sendBtn" onclick="sendEmbed()">Send Embed</button>

    <p id="cooldown"></p>
    <p id="status"></p>

  </div>

  <!-- PREVIEW -->
  <div id="preview" class="tab">
    <div id="embedPreview"></div>
    <button onclick="exportJSON()">Copy JSON</button>
    <button onclick="importJSON()">Paste JSON</button>
  </div>

  <!-- TEMPLATES -->
  <div id="templates" class="tab">
    <button onclick="applyTemplate('announce')">Announcement</button>
    <button onclick="applyTemplate('game')">Game Stats</button>
    <button onclick="applyTemplate('warning')">Warning</button>
  </div>

  <!-- SETTINGS -->
  <div id="settings" class="tab">
    <p>Cooldown: 30 seconds (client-side)</p>
    <button onclick="clearData()">Clear saved data</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
